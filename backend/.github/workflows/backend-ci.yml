name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' || mongo --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi motor pydantic aiohttp httpx bcrypt python-jose python-dotenv pytest pytest-timeout email-validator python-multipart pymongo uvicorn

      - name: Run pytest
        env:
          TEST_MONGO_URL: mongodb://localhost:27017
          APP_ENV: development
          JWT_SECRET_KEY: ci_secret_key_with_at_least_32_characters_long
        run: |
          python -m pytest -v -rs --maxfail=1
